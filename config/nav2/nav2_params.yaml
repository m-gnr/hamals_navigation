# hamals_navigation/config/nav2/nav2_params.yaml
#
# Mimari sözleşme:
#   - map -> odom : AMCL
#   - odom -> base_footprint : EKF (hamals_localization)
#   - base_footprint -> base_link -> lidar_link : URDF / robot_state_publisher
#   - /scan : LiDAR (frame_id=lidar_link)
#   - /cmd_vel : Nav2 -> (remap) -> serial_bridge -> MCU

/**:
  ros__parameters:
    use_sim_time: false

# ------------------------------------------------------------
# Map Server (Sabit harita kaynağı)
# ------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/m-gnr/maps/hamals_map.yaml"

# ------------------------------------------------------------
# AMCL
# ------------------------------------------------------------
amcl:
  ros__parameters:
    use_sim_time: false

    # Frame'ler
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint
    scan_topic: /scan

    # TF yayınlasın
    tf_broadcast: true

    # Particle ayarları
    min_particles: 500
    max_particles: 2000
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    transform_tolerance: 0.5

# ------------------------------------------------------------
# BT Navigator
# ------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false
    default_bt_xml_filename: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false
    default_bt_xml_filename: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

# ------------------------------------------------------------
# Planner Server
# ------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

# ------------------------------------------------------------
# Controller Server (RPP)
# ------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    odom_topic: /odom
    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["general_goal_checker"]
    progress_checker_plugins: ["progress_checker"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.20
      max_linear_accel: 0.6
      max_linear_decel: 0.6
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 1.5
      goal_dist_tol: 0.10

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.26
      stateful: true

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 10.0

# ------------------------------------------------------------
# Behavior Server
# ------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"

# ------------------------------------------------------------
# Waypoint Follower
# ------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

# ------------------------------------------------------------
# Velocity Smoother
# ------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.20, 0.0, 1.0]
    min_velocity: [-0.20, 0.0, -1.0]
    max_accel: [0.6, 0.0, 1.5]
    max_decel: [-0.6, 0.0, -1.5]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ------------------------------------------------------------
# Smoother Server
# ------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ------------------------------------------------------------
# Global Costmap (map frame)
# ------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      track_unknown_space: true
      robot_radius: 0.16
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

# ------------------------------------------------------------
# Local Costmap (odom frame)
# ------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      robot_radius: 0.16
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "scan"

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 0.50
          obstacle_range: 2.5
          raytrace_range: 4.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

# ------------------------------------------------------------
# Lifecycle Manager - Localization
# ------------------------------------------------------------
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl

# ------------------------------------------------------------
# Lifecycle Manager - Navigation
# ------------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother